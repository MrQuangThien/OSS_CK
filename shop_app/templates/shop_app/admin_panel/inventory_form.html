{% extends 'shop_app/admin_panel/base_admin.html' %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="fa-solid fa-box-open me-2 text-primary"></i>{{ title }}</h2>
            <a href="{% url 'admin_inventory' %}" class="btn btn-outline-secondary"><i class="fa-solid fa-arrow-left"></i> Trở về</a>
        </div>
        
        <div class="card card-admin mb-4">
            <div class="card-body bg-light rounded text-center py-4">
                <h5 class="text-muted mb-1">Đang cập nhật cho sản phẩm:</h5>
                <h4 class="fw-bold text-primary mb-0">{{ kho.san_pham.ten_san_pham }}</h4>
            </div>
        </div>

        <div class="card card-admin p-4">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3 text-start">
                    <label class="form-label text-muted">Tồn kho hiện tại:</label>
                    <input type="text" class="form-control fw-bold bg-light" value="{{ kho.so_luong_ton }} chiếc" disabled>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold text-primary">Số lượng Nhập / Xuất:</label>
                    <input type="number" name="so_luong_thay_doi" class="form-control form-control-lg text-center fw-bold text-primary" value="0" required>
                    <div class="form-text mt-2">
                        <i class="fa-solid fa-circle-info me-1"></i>
                        <strong>Mẹo:</strong> Nhập số dương (VD: <code>5</code>) để thêm hàng, nhập số có dấu trừ (VD: <code>-2</code>) để xuất hao hụt.
                    </div>
                </div>

                <hr>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">
                        <i class="fa-solid fa-floppy-disk me-2"></i>LƯU THAY ĐỔI
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

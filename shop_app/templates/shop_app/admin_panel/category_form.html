{% extends 'shop_app/admin_panel/base_admin.html' %}
{% block admin_content %}

    <div class="col-md-6">
        <h2 class="fw-bold mb-4">{{ title }}</h2>
        <div class="card card-admin p-4">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <hr>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">LƯU LẠI</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

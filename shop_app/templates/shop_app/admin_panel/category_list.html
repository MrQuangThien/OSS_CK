{% extends 'shop_app/admin_panel/base_admin.html' %}
{% block admin_content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-6"><h2><i class="fa-solid fa-tags me-2 text-primary"></i>Quản lý Loại hàng</h2></div>
    <div class="col-md-6 text-end">
        <a href="{% url 'admin_add_category' %}" class="btn btn-primary fw-bold shadow-sm">
            <i class="fa-solid fa-plus me-2"></i>Thêm Loại Mới
        </a>
    </div>
</div>
<div class="card card-admin">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr><th class="ps-4">ID</th><th>Tên Loại Hàng</th><th class="text-center pe-4">Thao Tác</th></tr>
            </thead>
            <tbody>
                {% for loai in list_loai %}
                <tr>
                    <td class="ps-4">#{{ loai.id }}</td>
                    <td class="fw-bold">{{ loai.ten_loai }}</td>
                    <td class="text-center pe-4">
                        <a href="{% url 'admin_delete_category' loai.id %}" class="btn btn-sm btn-outline-danger" 
                           onclick="return confirm('Bạn có chắc chắn muốn xóa?');">
                            <i class="fa-solid fa-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

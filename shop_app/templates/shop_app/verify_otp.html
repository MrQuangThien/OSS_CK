{% extends 'shop_app/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4 text-center">
                <h3 class="fw-bold mb-3">Xác thực OTP</h3>
                <p class="text-muted">Mã xác thực đã được gửi vào email của bạn. Vui lòng kiểm tra Mailtrap.</p>
                
                {% if messages %}
                    {% for message in messages %}<div class="alert alert-danger">{{ message }}</div>{% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <input type="text" name="otp" class="form-control text-center fs-3 mb-4" placeholder="000000" required>
                    <button type="submit" class="btn btn-primary w-100 py-2">XÁC NHẬN</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
